<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Danels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
</head>

<body>
    <header class="relative min-h-screen bg-cover bg-center bg-[url('/Groupe-2/karim/images/modi.jpg')]">


        <div class="absolute inset-0 bg-black/70"></div>
        <section
            class="relative z-10 flex flex-col items-center justify-center text-white text-center px-4 py-16 min-h-screen gap-10">

            <div class="space-y-4">
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold">
                    Groupe 2
                </h1>
                <p class="text-xl sm:text-3xl md:text-5xl">
                    Notre Equipe
                    <span id="type" class="font-semibold"></span>
                </p>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 w-full max-w-6xl">
                <!-- Card 1 -->
                <div
                    class="bg-white rounded-2xl shadow-lg p-6 flex flex-col items-center hover:scale-105 transition duration-300">
                    <img class="w-32 h-32 rounded-full object-cover mb-4" src="karim/images/modi.jpg"
                        alt="Abdou Karim" />
                    <h5 class="text-xl font-semibold text-black">
                        Moussa Fily Diallo
                    </h5>
                </div>
                <!-- Card 2 -->
                <div
                    class="bg-white rounded-2xl shadow-lg p-6 flex flex-col items-center hover:scale-105 transition duration-300">
                    <img class="w-32 h-32 rounded-full object-cover mb-4" src="karim/images/modi.jpg"
                        alt="Mariama Tirera" />

                    <h5 class="text-xl font-semibold text-black">
                       Mariama Tirera
                    </h5>
                </div>
                <!-- Card 3 -->
                <div
                    class="bg-white rounded-2xl shadow-lg p-6 flex flex-col items-center hover:scale-105 transition duration-300">
                    <img class="w-32 h-32 rounded-full object-cover mb-4" src="karim/images/modi.jpg"
                        alt="Abdou Karim" />
                    <h5 class="text-xl font-semibold text-black">
                        Abdou Karim
                    </h5>
                </div>
            </div>
        </section>
    </header>
    <script src="index.js"></script>
</body>
</html>
